{{- if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ .Site.Params.author }}",
  "url": "{{ .Site.BaseURL }}",
  "description": "{{ .Site.Params.description }}",
  "email": "{{ .Site.Params.email }}",
  "sameAs": [
    "{{ .Site.Params.linkedin }}",
    "https://github.com/auss"
  ],
  "jobTitle": "Engineering Manager",
  "knowsAbout": ["AI Adoption", "Multi-Agent Systems", "Engineering Leadership", "AI Strategy", "AI Security", "Team Building"],
  "alumniOf": {
    "@type": "Organization",
    "name": "AGH University of Science and Technology"
  },
  "worksFor": {
    "@type": "Organization",
    "name": "Self-employed"
  }
}
</script>
{{- else if and .IsPage (eq .Section "blog") }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Params.description }}",
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "wordCount": {{ .WordCount }},
  "url": "{{ .Permalink }}",
  "image": "{{ if .Params.image }}{{ .Site.BaseURL }}{{ strings.TrimPrefix "/" .Params.image }}{{ end }}",
  "author": {
    "@type": "Person",
    "name": "{{ .Site.Params.author }}",
    "url": "{{ .Site.BaseURL }}",
    "sameAs": [
      "{{ .Site.Params.linkedin }}",
      "https://github.com/auss"
    ]
  },
  "publisher": {
    "@type": "Person",
    "name": "{{ .Site.Params.author }}",
    "url": "{{ .Site.BaseURL }}"
  }{{ if .Params.tags }},
  "keywords": [{{ range $i, $tag := .Params.tags }}{{ if $i }}, {{ end }}"{{ $tag }}"{{ end }}]{{ end }}{{ if .Params.faq }},
  "mainEntity": [{{ range $i, $q := .Params.faq }}{{ if $i }},{{ end }}
    {
      "@type": "Question",
      "name": "{{ $q.question }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ $q.answer }}"
      }
    }{{ end }}
  ]{{ end }}
}
</script>
{{- if .Params.faq }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [{{ range $i, $q := .Params.faq }}{{ if $i }},{{ end }}
    {
      "@type": "Question",
      "name": "{{ $q.question }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ $q.answer }}"
      }
    }{{ end }}
  ]
}
</script>
{{- end }}
{{- end }}
